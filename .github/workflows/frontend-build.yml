name: Frontend Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        id: build
        run: npm run build

      - name: Run tests
        run: npm test -- --coverage --passWithNoTests

      # ── Notify Aeon on failure ─────────────────────────────────────────────
      - name: Notify Aeon (failure)
        if: failure()
        env:
          AEON_URL: ${{ secrets.AEON_URL }}
        run: |
          # Capture the last 100 lines of runner output as a log snippet
          LOG_SNIPPET="GitHub Actions build step failed. Check run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -sf -X POST "${AEON_URL}/api/pipelines/ingest" \
            -H "Content-Type: application/json" \
            -H "bypass-tunnel-reminder: true" \
            -d "{
              \"source\":        \"github\",
              \"name\":          \"${{ github.workflow }}\",
              \"status\":        \"failure\",
              \"repo\":          \"${{ github.repository }}\",
              \"branch\":        \"${{ github.ref_name }}\",
              \"run_id\":        \"${{ github.run_id }}\",
              \"url\":           \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"error_summary\": \"${{ steps.build.outcome == 'failure' && 'Build step failed — check vite.config.js aliases' || 'Test step failed' }}\",
              \"logs\":          \"${LOG_SNIPPET}\",
              \"commit_sha\":    \"${{ github.sha }}\",
              \"triggered_by\":  \"${{ github.actor }}\"
            }" || echo "Aeon notification failed (non-critical)"

      # ── Notify Aeon on success ─────────────────────────────────────────────
      - name: Notify Aeon (success)
        if: success()
        env:
          AEON_URL: ${{ secrets.AEON_URL }}
        run: |
          curl -sf -X POST "${AEON_URL}/api/pipelines/ingest" \
            -H "Content-Type: application/json" \
            -H "bypass-tunnel-reminder: true" \
            -d "{
              \"source\":      \"github\",
              \"name\":        \"${{ github.workflow }}\",
              \"status\":      \"success\",
              \"repo\":        \"${{ github.repository }}\",
              \"branch\":      \"${{ github.ref_name }}\",
              \"run_id\":      \"${{ github.run_id }}\",
              \"url\":         \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"commit_sha\":  \"${{ github.sha }}\",
              \"triggered_by\": \"${{ github.actor }}\"
            }" || echo "Aeon notification failed (non-critical)"
